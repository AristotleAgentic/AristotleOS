name: Feature proposal
description: Propose a new governance, runtime, docs, or deployment capability.
title: "[proposal] "
labels: ["proposal", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What consequential action, review gap, or deployment need should AristotleOS address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
    validations:
      required: true
  - type: textarea
    id: review
    attributes:
      label: Validation path
      description: How would a reviewer know this works?
    validations:
      required: false
