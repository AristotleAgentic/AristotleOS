name: CI

# AristotleOS continuous integration: typecheck, test, build, and dependency
# audit for the execution-control boundary, CLI, and console UI.
# The workspace lives under extracted/ in this repository.

on:
  push:
    branches: [main, ward-warrant-execution-control]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: extracted

jobs:
  build-test:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node >= 22.5 is required for the built-in node:sqlite ledger backend.
          node-version: '22'

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Typecheck (runtime · CLI · console-ui · adapters)
        # Build the runtime first so consumers resolve its emitted .d.ts, then
        # strict-typecheck every project (tsc --noEmit) — the whole source tree,
        # including the console UI that Vite/esbuild would otherwise build untyped.
        run: |
          corepack pnpm -F @aristotle/execution-control-runtime build
          corepack pnpm typecheck

      - name: Test (governance · execution-control · cli · api · chain)
        run: corepack pnpm test

      - name: Build CLI bundle
        run: corepack pnpm -F @aristotle/os-cli build

      - name: Build console UI
        run: corepack pnpm -F @aristotle/console-ui build

      - name: Boundary self-check
        run: node apps/aristotle-cli/dist/index.js pilot

      - name: Generate SBOM (smoke)
        run: corepack pnpm sbom

      - name: Clean-room scan
        run: corepack pnpm clean-room

  cli-package:
    name: CLI package (pack + packed pilot smoke)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Validate @aristotle/os-cli is publish-ready
        # Packs the CLI, asserts tarball contents, installs it into a throwaway
        # project, and runs `aristotle pilot` from the installed package.
        run: corepack pnpm package:cli:check

  helm-validate:
    name: helm chart (lint + template)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate chart (lint + template, default + kind-smoke)
        run: node scripts/validate-helm.mjs

  e2e-layout:
    name: console UI layout (Playwright, desktop + mobile)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: corepack pnpm -F @aristotle/console-ui exec playwright install --with-deps chromium

      - name: Layout check (build + desktop/mobile, no horizontal overflow)
        run: corepack pnpm -F @aristotle/console-ui test:e2e

  dependency-audit:
    name: dependency audit (prod)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Audit production dependencies
        # Informational: surfaces newly disclosed CVEs without blocking merges.
        # Review findings against sbom.json and the threat model.
        run: corepack pnpm audit --prod
        continue-on-error: true
