name: CI

on:
  push:
    branches: [ ward-warrant-execution-control, main ]
  pull_request:
    branches: [ ward-warrant-execution-control, main ]
  workflow_dispatch:

# Cancel in-progress runs on the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reviewer-and-core:
    name: Reviewer verification + core packages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Enable corepack
        run: corepack enable

      - name: Set pnpm version
        run: corepack prepare pnpm@10.32.1 --activate

      - name: Install
        run: corepack pnpm@10.32.1 install --frozen-lockfile

      - name: Reviewer verification (the headline check)
        run: corepack pnpm@10.32.1 run reviewer:verify

      - name: Reviewer tests
        run: corepack pnpm@10.32.1 run reviewer:test

      - name: Published replay artifact verification
        run: node --import tsx --test examples/mesh/published.replay.test.ts

      - name: Core packages (governance-core + execution-control-runtime + mesh-runtime + warrant-verifier + replay-artifact)
        run: corepack pnpm@10.32.1 run test:core

  protocol-adapters:
    name: Protocol adapters
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - run: corepack enable
      - run: corepack prepare pnpm@10.32.1 --activate
      - run: corepack pnpm@10.32.1 install --frozen-lockfile
      - name: Protocol adapter test suite (7 adapters)
        run: corepack pnpm@10.32.1 run test:protocol-adapters

  mesh-and-chaos:
    name: Mesh runtime + chaos harness + scenario engine
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - run: corepack enable
      - run: corepack prepare pnpm@10.32.1 --activate
      - run: corepack pnpm@10.32.1 install --frozen-lockfile
      - name: Mesh runtime + chaos + scenarios
        run: corepack pnpm@10.32.1 run test:mesh

  tenancy-and-pipeline:
    name: Tenancy + policy pipeline + time machine + event stream
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - run: corepack enable
      - run: corepack prepare pnpm@10.32.1 --activate
      - run: corepack pnpm@10.32.1 install --frozen-lockfile
      - name: Tenancy + pipeline + time-machine + event-stream
        run: corepack pnpm@10.32.1 run test:tenancy

  framework-adapters:
    name: Agent framework adapters (worked examples)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - run: corepack enable
      - run: corepack prepare pnpm@10.32.1 --activate
      - run: corepack pnpm@10.32.1 install --frozen-lockfile
      - name: Framework adapters
        run: corepack pnpm@10.32.1 run test:framework-adapters

  # Documentation hygiene: make sure the diligence docs exist and the
  # proof-status orientation runs clean.
  diligence-docs-present:
    name: Diligence docs present
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - run: corepack enable
      - run: corepack prepare pnpm@10.32.1 --activate
      - run: corepack pnpm@10.32.1 install --frozen-lockfile
      - name: proof:status orientation
        run: corepack pnpm@10.32.1 run proof:status
      - name: Required diligence docs are present
        shell: bash
        run: |
          required=(
            PROOF_STATUS.md
            VALIDATION_MATRIX.md
            THREAT_MODEL.md
            LIMITATIONS.md
            ARCHITECTURE.md
            VERSIONING.md
            SECURITY.md
            CONTRIBUTING.md
            CHANGELOG.md
            README.md
            ROADMAP_TO_100.md
            RELEASE_CHECKLIST.md
            docs/DILIGENCE_MEMO.md
            docs/MARKET_POSITIONING.md
            docs/ADAPTER_VALIDATION.md
            examples/reviewer/REVIEWER.md
            examples/reviewer/verify.ts
            examples/mesh/published.replay.json
            examples/mesh/published.replay.report.md
          )
          missing=()
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then missing+=("$f"); fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required diligence docs:"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi
          echo "All required diligence docs present."

  # Don't block merges on the legacy aristotle-cli typecheck — that
  # has a pre-existing dep declaration issue (see ROADMAP_TO_100.md
  # Category 2). When it's fixed, promote this to a required check.
  legacy-cli-typecheck:
    name: (Advisory) legacy CLI typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - run: corepack enable
      - run: corepack prepare pnpm@10.32.1 --activate
      - run: corepack pnpm@10.32.1 install --frozen-lockfile
      - name: Legacy CLI typecheck (advisory)
        run: |
          corepack pnpm@10.32.1 exec tsc --noEmit -p apps/aristotle-cli/tsconfig.json || true
