[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "aristotle-ag2"
version = "0.1.0"
description = "Govern AG2 (the AutoGen community fork) tool calls with AristotleOS."
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE", "NOTICE"]
requires-python = ">=3.9"
authors = [{ name = "AristotleAgentic" }]
keywords = ["aristotle", "ag2", "autogen", "ai-governance", "agent-governance"]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Typing :: Typed",
]
dependencies = ["aristotle-os-sdk>=0.1.0"]

[project.optional-dependencies]
ag2 = ["ag2>=0.4,<2.0"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[tool.hatch.build.targets.wheel]
packages = ["src/aristotle_ag2"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
