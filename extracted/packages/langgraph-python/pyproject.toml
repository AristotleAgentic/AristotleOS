[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "aristotle-langgraph"
version = "0.1.0"
description = "Govern LangGraph tool calls with AristotleOS. Drop-in wrap_tool_call middleware that routes every tool invocation in a ToolNode through the execution-control Commit Gate before it runs."
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE", "NOTICE"]
requires-python = ">=3.9"
authors = [
    { name = "AristotleAgentic" }
]
keywords = [
    "aristotle",
    "aristotleos",
    "langgraph",
    "langchain",
    "ai-governance",
    "agent-governance",
    "tool-call-gate",
    "commit-gate"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "aristotle-os-sdk>=0.1.0",
]

[project.optional-dependencies]
langgraph = [
    "langgraph>=0.2,<2.0",
    "langchain-core>=0.3,<1.0",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[project.urls]
Homepage = "https://github.com/AristotleAgentic/AristotleOS"
Repository = "https://github.com/AristotleAgentic/AristotleOS"
Issues = "https://github.com/AristotleAgentic/AristotleOS/issues"
Changelog = "https://github.com/AristotleAgentic/AristotleOS/blob/main/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["src/aristotle_langgraph"]

[tool.hatch.build.targets.sdist]
include = [
    "src/aristotle_langgraph",
    "tests",
    "README.md",
    "LICENSE",
    "NOTICE",
    "pyproject.toml",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
