[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "aristotle-os-sdk"
version = "0.1.0"
description = "Typed Python client for the AristotleOS execution-control boundary. Governs autonomous actions before they cross into consequence: evaluate -> warrant -> execute -> evidence."
readme = "README.md"
license = { text = "Proprietary" }
license-files = ["LICENSE", "NOTICE"]
requires-python = ">=3.9"
authors = [
    { name = "AristotleAgentic" }
]
keywords = [
    "aristotle",
    "aristotleos",
    "ai-governance",
    "agent-governance",
    "execution-control",
    "commit-gate",
    "authority",
    "warrant",
    "evidence-ledger"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "License :: Other/Proprietary License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27,<1.0",
]

[project.urls]
Homepage = "https://github.com/AristotleAgentic/AristotleOS"
Repository = "https://github.com/AristotleAgentic/AristotleOS"
Issues = "https://github.com/AristotleAgentic/AristotleOS/issues"
Changelog = "https://github.com/AristotleAgentic/AristotleOS/blob/main/CHANGELOG.md"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[tool.hatch.build.targets.wheel]
packages = ["src/aristotle"]

[tool.hatch.build.targets.sdist]
include = [
    "src/aristotle",
    "tests",
    "README.md",
    "LICENSE",
    "NOTICE",
    "pyproject.toml",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
