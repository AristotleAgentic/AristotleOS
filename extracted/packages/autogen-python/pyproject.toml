[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "aristotle-autogen"
version = "0.1.0"
description = "Govern AutoGen tool calls with AristotleOS."
readme = "README.md"
license = { text = "Proprietary" }
license-files = ["LICENSE", "NOTICE"]
requires-python = ">=3.9"
authors = [{ name = "AristotleAgentic" }]
keywords = ["aristotle", "autogen", "ai-governance", "agent-governance", "commit-gate"]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: Other/Proprietary License",
    "Programming Language :: Python :: 3",
    "Typing :: Typed",
]
dependencies = ["aristotle-os-sdk>=0.1.0"]

[project.optional-dependencies]
autogen = ["autogen-core>=0.4,<2.0", "autogen-agentchat>=0.4,<2.0"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[tool.hatch.build.targets.wheel]
packages = ["src/aristotle_autogen"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
