version: "3.9"
services:
  meta-authority-registry:
    build:
      context: .
      dockerfile: manifests/docker/service.Dockerfile
      args: { SERVICE_PATH: services/meta-authority-registry }
    env_file: .env
    restart: unless-stopped
    ports: ["7004:7004"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7004/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
  policy-compiler:
    build:
      context: .
      dockerfile: manifests/docker/service.Dockerfile
      args: { SERVICE_PATH: services/policy-compiler }
    env_file: .env
    restart: unless-stopped
    ports: ["7002:7002"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7002/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
  evidence-ledger:
    build:
      context: .
      dockerfile: manifests/docker/service.Dockerfile
      args: { SERVICE_PATH: services/evidence-ledger }
    env_file: .env
    restart: unless-stopped
    ports: ["7003:7003"]
    volumes:
      - ledger-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7003/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
  authority-router:
    build:
      context: .
      dockerfile: manifests/docker/service.Dockerfile
      args: { SERVICE_PATH: services/authority-router }
    env_file: .env
    restart: unless-stopped
    ports: ["7006:7006"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7006/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
  witness-service:
    build:
      context: .
      dockerfile: manifests/docker/service.Dockerfile
      args: { SERVICE_PATH: services/witness-service }
    env_file: .env
    restart: unless-stopped
    ports: ["7007:7007"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7007/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
  execution-gate:
    build:
      context: .
      dockerfile: manifests/docker/service.Dockerfile
      args: { SERVICE_PATH: services/execution-gate }
    env_file: .env
    restart: unless-stopped
    ports: ["7008:7008"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7008/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
  governance-kernel:
    build:
      context: .
      dockerfile: manifests/docker/service.Dockerfile
      args: { SERVICE_PATH: services/governance-kernel }
    env_file: .env
    restart: unless-stopped
    ports: ["7001:7001"]
    volumes:
      - kernel-data:/app/data
    depends_on:
      meta-authority-registry: { condition: service_healthy }
      policy-compiler: { condition: service_healthy }
      authority-router: { condition: service_healthy }
      witness-service: { condition: service_healthy }
      execution-gate: { condition: service_healthy }
      evidence-ledger: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7001/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
  simulation-engine:
    build:
      context: .
      dockerfile: manifests/docker/service.Dockerfile
      args: { SERVICE_PATH: services/simulation-engine }
    env_file: .env
    restart: unless-stopped
    ports: ["7005:7005"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7005/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
  agent-os:
    build:
      context: .
      dockerfile: manifests/docker/service.Dockerfile
      args: { SERVICE_PATH: services/agent-os }
    env_file: .env
    restart: unless-stopped
    ports: ["7009:7009"]
    volumes:
      - agent-os-data:/app/data
    depends_on:
      governance-kernel: { condition: service_healthy }
      execution-gate: { condition: service_healthy }
      evidence-ledger: { condition: service_healthy }
      authority-router: { condition: service_healthy }
      witness-service: { condition: service_healthy }
      policy-compiler: { condition: service_healthy }
      simulation-engine: { condition: service_healthy }
      meta-authority-registry: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7009/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
  http-gateway:
    build:
      context: .
      dockerfile: manifests/docker/service.Dockerfile
      args: { SERVICE_PATH: adapters/http-gateway }
    env_file: .env
    restart: unless-stopped
    ports: ["8080:8080"]
    depends_on:
      governance-kernel: { condition: service_healthy }
      simulation-engine: { condition: service_healthy }
      agent-os: { condition: service_healthy }
      evidence-ledger: { condition: service_healthy }
      policy-compiler: { condition: service_healthy }
      meta-authority-registry: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
  console-ui:
    build:
      context: .
      dockerfile: manifests/docker/console-ui.Dockerfile
    env_file: .env
    restart: unless-stopped
    ports: ["4173:4173"]
    depends_on:
      http-gateway: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4173 >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
volumes:
  ledger-data:
  agent-os-data:
  kernel-data:
