apiVersion: v1
kind: Secret
metadata:
  name: aristotle-runtime-secrets
  namespace: aristotle-governance-os
type: Opaque
stringData:
  # Replace every value before applying. This file documents the required secret
  # contract for the production manifests; do not commit real secret material.
  OPERATOR_API_KEY: "replace-with-strong-operator-secret"
  OPERATOR_SESSION_SECRET: "replace-with-strong-session-signing-secret"
  EVIDENCE_LEDGER_SIGNING_SECRET: "replace-with-strong-ledger-signing-secret"
  GOVERNANCE_CHAIN_SIGNING_SECRET: "replace-with-strong-chain-signing-secret"
