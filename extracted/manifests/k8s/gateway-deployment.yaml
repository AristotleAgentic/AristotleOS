apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-gateway
  namespace: aristotle-governance-os
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-gateway
  template:
    metadata:
      labels:
        app: http-gateway
    spec:
      containers:
        - name: http-gateway
          image: aristotle/http-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT_GATEWAY
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: http-gateway
  namespace: aristotle-governance-os
spec:
  selector:
    app: http-gateway
  ports:
    - port: 8080
      targetPort: 8080
