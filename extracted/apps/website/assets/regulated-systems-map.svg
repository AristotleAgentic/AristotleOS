<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Regulated systems credibility map</title>
  <desc id="desc">A portable diagram connecting UAV operations, conservation fundraising, public affairs, cannabis regulation, civic AI, and autonomous governance.</desc>
  <defs>
    <radialGradient id="r" cx="50%" cy="45%" r="68%">
      <stop offset="0" stop-color="#23352f"/>
      <stop offset=".55" stop-color="#101a17"/>
      <stop offset="1" stop-color="#0b1110"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#r)"/>
  <g opacity=".18" stroke="#f6f1e8" fill="none">
    <circle cx="600" cy="360" r="270"/>
    <circle cx="600" cy="360" r="190"/>
    <circle cx="600" cy="360" r="110"/>
    <path d="M600 72 v576 M312 360 h576 M396 156 L804 564 M804 156 L396 564"/>
  </g>
  <circle cx="600" cy="360" r="84" fill="#0b1110" stroke="#e9c46a" stroke-width="3"/>
  <text x="600" y="345" text-anchor="middle" fill="#f6f1e8" font-family="Georgia,serif" font-size="30">Governed</text>
  <text x="600" y="382" text-anchor="middle" fill="#e9c46a" font-family="Georgia,serif" font-size="30">Autonomy</text>
  <g font-family="Arial,sans-serif" font-size="18" fill="#c8c0b2">
    <g transform="translate(128 118)">
      <rect width="252" height="116" rx="10" fill="#121d1a" stroke="#8eb4ff"/>
      <text x="22" y="36" fill="#8eb4ff" font-weight="700">UAV / FIELD SYSTEMS</text>
      <text x="22" y="68">sensor payloads, imaging,</text>
      <text x="22" y="94">wildfire recovery, swarms</text>
    </g>
    <g transform="translate(816 120)">
      <rect width="256" height="116" rx="10" fill="#121d1a" stroke="#62d6a7"/>
      <text x="22" y="36" fill="#62d6a7" font-weight="700">REGULATED MARKETS</text>
      <text x="22" y="68">law, compliance, agencies,</text>
      <text x="22" y="94">public legitimacy</text>
    </g>
    <g transform="translate(122 482)">
      <rect width="276" height="116" rx="10" fill="#121d1a" stroke="#e9c46a"/>
      <text x="22" y="36" fill="#e9c46a" font-weight="700">NONPROFIT CAPACITY</text>
      <text x="22" y="68">fundraising, public affairs,</text>
      <text x="22" y="94">mission-driven operations</text>
    </g>
    <g transform="translate(802 482)">
      <rect width="276" height="116" rx="10" fill="#121d1a" stroke="#d58aa7"/>
      <text x="22" y="36" fill="#d58aa7" font-weight="700">CIVIC AI / WORKFORCE</text>
      <text x="22" y="68">training, public trust,</text>
      <text x="22" y="94">institutional adoption</text>
    </g>
  </g>
  <g stroke="#e9c46a" stroke-width="3" opacity=".62" fill="none">
    <path d="M380 176 C468 196 514 248 552 296"/>
    <path d="M816 178 C728 202 678 248 648 296"/>
    <path d="M398 540 C474 506 522 456 552 424"/>
    <path d="M802 540 C732 506 676 456 648 424"/>
  </g>
</svg>
