# Vertical: healthcare clinical decision support
# Doctrine alignment: Clinical recommendations, medication-ordering tool calls, and
# any agent-mediated action that touches PHI transit a Warrant. Per-peer rate limit
# is aggressive (100/min) because per-clinician + per-bot peers are bounded and a
# burst above that pattern is almost certainly a compromised credential.
# Compliance reference: HIPAA Security Rule (45 CFR 164.308–.316) and ONC HTI-1 final
#   rule on predictive DSI transparency — DEMONSTRATION ONLY. Production deployments
#   require the operator's HIPAA Security Officer sign-off on the PHI-handling
#   policy bundle and a documented BAA covering the Warrant verifier chain.
# Last reviewed: 2026-06-05
#
# Apply on top of an environment profile:
#
#   helm template aristotle charts/aristotle-governance-os \
#     -f charts/aristotle-governance-os/values-healthcare.yaml \
#     -f charts/aristotle-governance-os/values-hardened.yaml
#
# Field provenance
# ────────────────
#   `runtimeConfig.*`     — template-consumed.
#   `secrets.*`           — template-consumed.
#   `services.*`          — template-consumed (resource sizing).
#   `mesh.*`              — operator-facing documentation; bind in mesh-runtime config.
#   `gel.*`               — operator-facing documentation; bind in evidence-ledger config.
#   `adapters.*`          — operator-facing posture statement.
#   `global.vertical`     — discovery tag.
#   `global.doctrine`     — operator-facing prose.

global:
  vertical: "healthcare"
  doctrine: |
    Clinical decision support: every recommendation surfaced to a clinician,
    every order-set generated by an agent, every PHI-touching tool call passes
    the gate with a single-use Warrant. Mesh quorum is two (small clinical
    environments; quorum-3 stalls during a single-node outage). Per-peer rate
    limit is aggressive — clinician + bot peers are bounded; a burst above
    100/min is almost certainly a compromised credential. GEL retention is
    7 years to match HIPAA documentation-retention practice.

mesh:
  productionMode: true
  revocationQuorum: 2                  # small clinical envs; quorum=3 stalls during single-node outage
  rateLimit:
    perPeerPerMinute: 100              # aggressive — clinician + bot peers are bounded
  replayCache:
    ttlMs: 60000
  partition:
    disconnectedWarrantCap: 3          # very small partition tolerance — clinical risk

gel:
  retention:
    maxAgeDays: 2555                   # 7 years — HIPAA documentation-retention practice
  timestamp:
    enabled: true
    kind: "rfc3161"
  archive:
    enabled: true
    minimumRetentionDays: 2555
  # PHI-sensitive: archive sidecar SHOULD encrypt at rest and the operator
  # must configure a BAA-covered KMS keyring (see shared/kms-keyring).
  encryptAtRest: true

adapters:
  demonstrationOnlyBlocked: true

runtimeConfig:
  NODE_ENV: "production"
  ALLOW_INSECURE_PRODUCTION_BOOT: "false"
  GOVERNANCE_CHAIN_MODE: "enforce"
  OPERATOR_SESSION_ENFORCEMENT: "true"
  OPERATOR_ROLE_ENFORCEMENT: "true"
  WITNESS_QUORUM: "2"
  # Short session TTL — HIPAA min-necessary access supports frequent re-auth.
  OPERATOR_SESSION_TTL_MS: "600000"
  # Operator actor allow-list tighter than the default; populated per deployment.
  OPERATOR_READ_ACTORS: "enterprise-console,clinical-validation"
  OPERATOR_MUTATION_ACTORS: "enterprise-console,clinical-admin"
  OTEL_RESOURCE_ATTRIBUTES_VERTICAL: "vertical=healthcare"

telemetry:
  otel:
    enabled: true
    resourceAttributes: "deployment.environment=pilot,service.namespace=aristotle-governance-os,vertical=healthcare"

# Healthcare workloads bias toward bursty agent-os traffic and evidence-ledger writes,
# steady kernel load. PHI-handling justifies a separate, sized ledger PV.
services:
  governance-kernel:
    replicas: 2
    resources:
      requests: { cpu: 500m, memory: 1Gi }
      limits:   { cpu: 2000m, memory: 4Gi }
  execution-gate:
    replicas: 2
    resources:
      requests: { cpu: 500m, memory: 512Mi }
      limits:   { cpu: 2000m, memory: 2Gi }
  evidence-ledger:
    replicas: 1
    persistentVolume:
      enabled: true
      size: 100Gi                       # 7-year retention; per-patient volume varies
      mountPath: /var/lib/aristotle
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits:   { cpu: 1500m, memory: 2Gi }
  witness-service:
    replicas: 2
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 1000m, memory: 1Gi }
  policy-compiler:
    replicas: 2
  meta-authority-registry:
    replicas: 2
  authority-router:
    replicas: 2
  agent-os:
    replicas: 2                         # clinician-facing agent surface; HA matters
    persistentVolume:
      enabled: true
      size: 20Gi
      mountPath: /var/lib/aristotle
