apiVersion: v1
kind: ConfigMap
metadata:
  name: aristotle-runtime-config
  namespace: {{ include "aristotle.namespace" . }}
  labels:
{{ include "aristotle.commonLabels" . | indent 4 }}
data:
{{- range $key, $value := .Values.runtimeConfig }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
{{- range $name, $svc := .Values.services }}
  {{ printf "PORT_%s" ($name | upper | replace "-" "_") }}: {{ $svc.port | quote }}
{{- end }}
{{- if .Values.telemetry.otel.enabled }}
  OTEL_TRACES_EXPORTER: {{ .Values.telemetry.otel.tracesExporter | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.telemetry.otel.exporterEndpoint | quote }}
  OTEL_RESOURCE_ATTRIBUTES: {{ .Values.telemetry.otel.resourceAttributes | quote }}
{{- end }}
{{- if .Values.identity.spiffe.enabled }}
  SPIFFE_TRUST_DOMAIN: {{ .Values.identity.spiffe.trustDomain | quote }}
  SPIFFE_SOCKET_PATH: {{ .Values.identity.spiffe.socketPath | quote }}
{{- end }}
